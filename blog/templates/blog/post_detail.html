{% extends 'blog/base.html' %}

{% block content %}

<div class="post-detail">

    {% if post.featured_image %}
        <img src="{{ post.featured_image.url }}" class="detail-image">
    {% endif %}

    <h1>{{ post.title }}</h1>

    <p class="meta">
        {% if post.author %}By {{ post.author }}{% endif %}
        • {{ post.created_at|date:"M d, Y" }}
        • {{ post.category }}
    </p>

    <div class="content">
        {{ post.content }}
    </div>

</div>

{% endblock %}
